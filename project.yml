name: PetMacOS
options:
  bundleIdPrefix: com.desktoppet
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
targets:
  PetMacOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/PetMacOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.desktoppet.PetMacOS
        PRODUCT_NAME: PetMacOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: N5VJ7TQLY7
        MARKETING_VERSION: "1.0.0"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []

name: PetMacOS
options:
  bundleIdPrefix: com.desktoppet
  deploymentTarget:
    macOS: "14.0"
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  PetMacOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/PetMacOS
    dependencies:
      - package: Sparkle
    # Explicit Info.plist (generated by xcodegen from these properties) instead
    # of GENERATE_INFOPLIST_FILE: Sparkle needs custom keys (feed URL + EdDSA
    # public key) that have no INFOPLIST_KEY_* build-setting equivalents.
    info:
      path: Support/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        # Sparkle compares sparkle:version = CFBundleVersion. Tie it to the
        # marketing version so every release is strictly newer than the last
        # (1.3.0 shipped as build "1"; "1.4.0" > "1" still compares right).
        CFBundleVersion: $(MARKETING_VERSION)
        # Sparkle auto-update feed; regenerated by scripts/build-release.sh
        # and committed to the repo so raw.githubusercontent.com serves it.
        SUFeedURL: https://raw.githubusercontent.com/thuctv2000/ClaudePet/main/appcast.xml
        SUPublicEDKey: xv9p3qTJNcq3r+SH/wzsQYsYuSlGDGtPnieC/wELvRE=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.desktoppet.PetMacOS
        PRODUCT_NAME: PetMacOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # No DEVELOPMENT_TEAM here on purpose: forks/contributors build with
        # ad-hoc local signing out of the box. Release signing is injected by
        # scripts/build-release.sh (PET_SIGN_IDENTITY / PET_TEAM_ID env vars).
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.5.0"
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []
